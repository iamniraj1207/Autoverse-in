{% extends "layout.html" %}
{% block title %}Register — AutoVerse{% endblock %}

{% block content %}
<div class="auth-page container">
    <div class="auth-card">
        <div class="badge">◆ Create Account</div>
        <h2>JOIN THE<br><span>AUTOVERSE</span></h2>
        {% if error %}<div class="form-error">{{ error }}</div>{% endif %}
        <form method="POST" action="/register">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" placeholder="your_username" required autofocus>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" placeholder="Min. 8 characters" required>
            </div>
            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input id="confirm" type="password" name="confirm" placeholder="Repeat password" required>
            </div>
            <button type="submit" class="btn btn-primary w-full">Create Account</button>
        </form>
        <div class="mt-4 mb-3 text-center muted small">OR JOIN THE GRID WITH</div>
        <div class="d-grid gap-2 mb-4">
            <a href="/auth/google" class="btn btn-social btn-google">
                <i class="fab fa-google"></i> Join with Google
            </a>
            <a href="/auth/github" class="btn btn-social btn-github">
                <i class="fab fa-github"></i> Join with GitHub
            </a>
            <a href="/auth/discord" class="btn btn-social btn-discord">
                <i class="fab fa-discord"></i> Join with Discord
            </a>
        </div>
        <p class="auth-switch">Already a member? <a href="/login">Login</a></p>
    </div>
</div>
{% endblock %}
