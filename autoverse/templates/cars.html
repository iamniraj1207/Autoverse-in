{% extends "layout.html" %}
{% block title %}Explore the Fleet — AutoVerse{% endblock %}

{% block head %}
<style>
    .car-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 50px; /* Increased from default */
        padding: 50px 0;
    }
    
    .page-section {
        padding-top: 100px;
        padding-bottom: 150px;
    }

    .premium-badge {
        font-family: 'DM Mono', monospace;
        letter-spacing: 5px;
        font-size: 10px;
        margin-bottom: 20px;
        display: inline-block;
        color: #e83a3a;
    }
</style>
{% endblock %}

{% block content %}
<div class="container page-section">
    <div class="page-header" data-aos="fade-up">
        <div class="badge premium-badge">◆ ELITE FLEET</div>
        <h2>EXPLORE<br><span class="accent">THE AUTOVERSE</span></h2>
    </div>

    <!-- Enhanced Search & Filter Bar -->
    <div class="premium-filter-bar" data-aos="fade-up">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search by brand or model...">
            <span class="search-icon">🔍</span>
        </div>

        <div class="filters-wrap">
            <select id="filter-brand" onchange="applyFilters()">
                <option value="">All Brands</option>
                {% for b in brands %}
                <option value="{{ b.brand }}">{{ b.brand }}</option>
                {% endfor %}
            </select>

            <select id="filter-category" onchange="applyFilters()">
                <option value="">All Categories</option>
                {% for c in categories %}
                <option value="{{ c.category }}">{{ c.category }}</option>
                {% endfor %}
            </select>

            <select id="sort-select" onchange="applySort()">
                <option value="default">Sort: Default</option>
                <option value="fastest">Sort: Fastest (HP)</option>
                <option value="quickest">Sort: Quickest (0-100)</option>
                <option value="newest">Sort: Newest First</option>
                <option value="price-high">Sort: Price (High to Low)</option>
            </select>
        </div>
    </div>

    <!-- Virtual Scroll Grid -->
    <div id="cars-grid" class="car-grid premium-grid">
        <!-- JS will populate this -->
        <div class="grid-loader">
            <div class="spinner"></div>
            <p>Loading the AutoVerse fleet...</p>
        </div>
    </div>

    <!-- Infinite Scroll Sentinel -->
    <div id="scroll-sentinel" style="height: 100px; margin-top: 50px;"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/cars_virtual_scroll.js') }}"></script>
{% endblock %}
